name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

# Grant write permission to GitHub Pages and id-token for OIDC
permissions:
  contents: read          # needed for checkout
  pages: write            # needed to deploy
  id-token: write         # needed for OIDC authentication

# Prevent multiple deployments running at once
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Optional but recommended: explicitly configure Pages
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5   # ← updated version

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist                        # ← must match your build output folder

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
